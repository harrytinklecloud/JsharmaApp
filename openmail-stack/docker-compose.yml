services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: openmail-mailserver
    hostname: ${MAIL_FQDN}
    env_file:
      - .env
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    volumes:
      - ./data/dms/mail-data:/var/mail
      - ./data/dms/mail-state:/var/mail-state
      - ./data/dms/mail-logs:/var/log/mail
      - ./config/dms:/tmp/docker-mailserver
      - ./certs:/etc/ssl/mail:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      OVERRIDE_HOSTNAME: ${MAIL_FQDN}
      POSTMASTER_ADDRESS: ${POSTMASTER_ADDRESS}
      ENABLE_RSPAMD: "1"
      ENABLE_OPENDKIM: "0"
      ENABLE_OPENDMARC: "0"
      ENABLE_POLICYD_SPF: "0"
      ENABLE_AMAVIS: "0"
      ENABLE_SPAMASSASSIN: "0"
      ENABLE_POSTGREY: "0"
      RSPAMD_GREYLISTING: "1"
      ENABLE_CLAMAV: ${ENABLE_CLAMAV}
      MOVE_SPAM_TO_JUNK: "1"
      ENABLE_FAIL2BAN: "1"
      SPOOF_PROTECTION: "1"
      PERMIT_DOCKER: network
      SSL_TYPE: manual
      SSL_CERT_PATH: /etc/ssl/mail/fullchain.pem
      SSL_KEY_PATH: /etc/ssl/mail/privkey.pem
      ONE_DIR: "1"
      TZ: ${TZ}
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    stop_grace_period: 1m

  roundcube-db:
    image: mariadb:11
    container_name: openmail-roundcube-db
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: ${ROUNDCUBE_DB_NAME}
      MARIADB_USER: ${ROUNDCUBE_DB_USER}
      MARIADB_PASSWORD: ${ROUNDCUBE_DB_PASSWORD}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
      TZ: ${TZ}
    volumes:
      - ./data/roundcube-db:/var/lib/mysql
    restart: unless-stopped

  roundcube:
    image: roundcube/roundcubemail:latest-apache
    container_name: openmail-roundcube
    env_file:
      - .env
    depends_on:
      - roundcube-db
      - mailserver
    ports:
      - "${ROUNDCUBE_HTTP_PORT}:80"
    environment:
      ROUNDCUBEMAIL_DB_TYPE: mysql
      ROUNDCUBEMAIL_DB_HOST: roundcube-db
      ROUNDCUBEMAIL_DB_PORT: 3306
      ROUNDCUBEMAIL_DB_NAME: ${ROUNDCUBE_DB_NAME}
      ROUNDCUBEMAIL_DB_USER: ${ROUNDCUBE_DB_USER}
      ROUNDCUBEMAIL_DB_PASSWORD: ${ROUNDCUBE_DB_PASSWORD}
      ROUNDCUBEMAIL_DEFAULT_HOST: ssl://mailserver
      ROUNDCUBEMAIL_DEFAULT_PORT: 993
      ROUNDCUBEMAIL_SMTP_SERVER: tls://mailserver
      ROUNDCUBEMAIL_SMTP_PORT: 587
      ROUNDCUBEMAIL_DES_KEY: ${ROUNDCUBE_DES_KEY}
      ROUNDCUBEMAIL_PLUGINS: archive,zipdownload,password,newmail_notifier
    volumes:
      - ./data/roundcube:/var/roundcube
    restart: unless-stopped
