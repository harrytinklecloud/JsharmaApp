<script>

/* visor */

function drawVisor(){
const canvas=document.getElementById("visor")
const ctx=canvas.getContext("2d")

ctx.beginPath()
ctx.moveTo(5,45)
ctx.bezierCurveTo(15,64,45,64,55,45)
ctx.lineTo(55,20)
ctx.bezierCurveTo(55,15,50,10,45,10)
ctx.lineTo(15,10)
ctx.bezierCurveTo(15,10,5,10,5,20)
ctx.lineTo(5,45)

ctx.fillStyle="#2f3640"
ctx.strokeStyle="#f5f6fa"
ctx.fill()
ctx.stroke()
}

/* cord animation */

const cordCanvas=document.getElementById("cord")
const ctx=cordCanvas.getContext("2d")

let y1=160
let y2=100
let y3=100

let y1Forward=true
let y2Forward=false
let y3Forward=true

function animate(){

requestAnimationFrame(animate)

ctx.clearRect(0,0,innerWidth,innerHeight)

ctx.beginPath()
ctx.moveTo(130,170)
ctx.bezierCurveTo(250,y1,345,y2,400,y3)

ctx.strokeStyle="white"
ctx.lineWidth=8
ctx.stroke()

if(y1===100){y1Forward=true}
if(y1===300){y1Forward=false}

if(y2===100){y2Forward=true}
if(y2===310){y2Forward=false}

if(y3===100){y3Forward=true}
if(y3===317){y3Forward=false}

y1Forward?y1+=1:y1-=1
y2Forward?y2+=1:y2-=1
y3Forward?y3+=1:y3-=1
}

/* mouse parallax */

document.addEventListener("mousemove",function(e){

const x=(e.clientX/window.innerWidth)-0.5
const y=(e.clientY/window.innerHeight)-0.5

document.querySelector(".astronaut").style.transform =
`translate(calc(-50% + ${x*40}px), calc(-50% + ${y*40}px)) rotate(20deg) scale(1.2)`

document.querySelector(".moon").style.transform =
`translate(${x*30}px, ${y*30}px)`

})

drawVisor()
animate()

</script>
